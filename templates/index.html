<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreatorLens — YouTube Influencer Analysis</title>
  <meta name="description" content="Analyze YouTube creators with AI-powered sentiment analysis. Get data-driven collaboration recommendations based on real audience sentiment." />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
</head>
<body>

  <!-- Decorative orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <a class="nav-logo" href="#/" id="nav-logo">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="url(#g)" stroke-width="2"/>
        <path d="M10 9l10 5-10 5V9z" fill="url(#g)"/>
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6c63ff"/>
            <stop offset="1" stop-color="#00d4ff"/>
          </linearGradient>
        </defs>
      </svg>
      <span>CreatorLens</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="#/" id="nav-home" data-view="home">
        🏠 <span>Home</span>
      </a>
      <a class="nav-link" href="#/categories" id="nav-categories" data-view="categories">
        📂 <span>Categories</span>
      </a>
      <a class="nav-link" href="#/search" id="nav-search" data-view="search">
        🔍 <span>Search</span>
      </a>
    </div>
  </nav>

  <!-- App mount point -->
  <main id="app"></main>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/views/home.js"></script>
  <script src="/static/js/views/categories.js"></script>
  <script src="/static/js/views/search.js"></script>
  <script src="/static/js/views/analyze.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
